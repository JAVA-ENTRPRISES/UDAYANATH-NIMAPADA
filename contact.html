<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facilities | Udayanath Public School</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="hero" style="height: 30vh; clip-path: none;">
        <div class="hero-content">
            <h2>Contact Us</h2>
        </div>
    </section>

<main class="container">
    <div class="card-grid" style="grid-template-columns: 1fr 1fr;">
        <div class="glass-card">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Contact Details</h2>
            <p><strong>Office Address:</strong><br>AT - Rench Sasan, PO - Rench<br>PS - Nimapara, Dist - Puri<br>Odisha, 752114</p>
            <p style="margin-top: 15px;"><strong>Email:</strong> udayanathpschool@gmail.com</p>
            <p><strong>Mobile:</strong> 8280120734</p>
        </div>
        
        <div class="glass-card">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Send an Inquiry</h2>
            <form>
                <input type="text" placeholder="Student Name" style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <input type="email" placeholder="Parent Email" style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <textarea placeholder="How can we help?" style="width: 100%; padding: 12px; height: 100px; border: 1px solid #ddd; border-radius: 5px;"></textarea>
                <button class="btn-modern" style="border: none; width: 100%; margin-top: 10px;">Submit Message</button>
            </form>
        </div>
    </div>
</main>
    <script src="script.js"></script>
</body>
</html>
